services:
  php:
    build: 
      context: .
      dockerfile_inline: |
        FROM dunglas/frankenphp:php8.4-alpine

        # Install system dependencies
        RUN apk add --no-cache \
            supervisor \
            dcron \
            bash \
            zip \
            unzip \
            curl \
            mysql-client
        
        # Install PHP extensions needed for Laravel
        RUN install-php-extensions \
            pdo_mysql \
            gd \
            intl \
            zip \
            opcache \
            redis \
            bcmath \
            pcntl \
            mbstring \
            xml \
            curl

        # Create app directory with correct permissions
        RUN mkdir -p /app && chown www-data:www-data /app
        WORKDIR /app
        
        # Copy custom php.ini
        COPY docker-prod/franken/php.ini /usr/local/etc/php/php.ini
        
        # Copy supervisor configuration
        COPY docker-prod/franken/supervisord.conf /etc/supervisor/conf.d/supervisord.conf
        
        # Copy application files
        COPY --chown=www-data:www-data . .
        COPY --chown=www-data:www-data .env.docker .env

        # Ensure proper permissions
        RUN find /app -type f -exec chmod 644 {} \;
        RUN find /app -type d -exec chmod 755 {} \;
       
        # Copy composer
        COPY --from=composer:latest /usr/bin/composer /usr/bin/composer
        
        COPY ./docker-prod/franken/entrypoint.sh /usr/local/bin/entrypoint.sh
        RUN chmod +x /usr/local/bin/entrypoint.sh
        
        # Install dependencies as www-data
        USER www-data
        RUN composer install --optimize-autoloader --no-interaction --no-scripts
        USER root

        # Create Laravel cron entry for www-data
        RUN echo "* * * * * su -s /bin/sh www-data -c 'cd /app && php artisan schedule:run >> /dev/null 2>&1'" > /etc/crontabs/root
        
        # Create log directory
        RUN mkdir -p /var/log/supervisor
        
        ENTRYPOINT ["/usr/local/bin/entrypoint.sh"]
        CMD ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
        
    restart: unless-stopped
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      - SERVER_NAME=:80
    ports:
      - 80
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - invoice-net
    depends_on:
      invoice-mysql:
        condition: service_healthy
      invoice-redis:
        condition: service_healthy

  invoice-mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password --max_allowed_packet=128M --innodb_buffer_pool_size=2G --sort_buffer_size=32M --join_buffer_size=32M --innodb_log_file_size=512M
    restart: unless-stopped
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: yes
      MYSQL_USER: $DB_USERNAME
      MYSQL_PASSWORD: $DB_PASSWORD
      MYSQL_DATABASE: $DB_DATABASE
    ports:
      - 3306
    volumes:
      - invoice_db_data:/var/lib/mysql
    networks:
      - invoice-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  invoice-redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - invoice-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

# Volumes needed for Caddy certificates and configuration
volumes:
  caddy_data:
  caddy_config:
  invoice_db_data:

networks:
  invoice-net:
